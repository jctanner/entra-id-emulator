<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .error-container {
            background: white;
            padding: 44px;
            width: 440px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }
        .error-title {
            font-size: 20px;
            font-weight: 600;
            color: #e81123;
            margin-bottom: 16px;
        }
        .error-description {
            font-size: 15px;
            color: #1a1a1a;
            line-height: 1.5;
        }
        .error-code {
            margin-top: 16px;
            font-size: 13px;
            color: #666;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-title">{{ error }}</div>
        <div class="error-description">{{ description }}</div>
        {% if error_code %}
        <div class="error-code">Error code: {{ error_code }}</div>
        {% endif %}
    </div>
</body>
</html>
