<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - {{ client_name }}</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 44px;
            width: 440px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }
        .logo {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 16px;
        }
        .subtitle {
            font-size: 15px;
            color: #1a1a1a;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid #666;
            font-size: 15px;
            box-sizing: border-box;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #0067b8;
            outline: none;
        }
        .error-message {
            color: #e81123;
            font-size: 13px;
            margin-bottom: 12px;
        }
        .submit-btn {
            background-color: #0067b8;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
        }
        .submit-btn:hover {
            background-color: #005da6;
        }
        .mock-notice {
            margin-top: 24px;
            padding: 8px 12px;
            background: #fff4ce;
            border: 1px solid #f0c800;
            font-size: 12px;
            color: #5a5a5a;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">Sign in</div>
        <div class="subtitle">to continue to {{ client_name }}</div>

        {% if error_message %}
        <div class="error-message">{{ error_message }}</div>
        {% endif %}

        <form method="POST" action="/{{ tenant }}/oauth2/v2.0/authorize">
            <input type="hidden" name="client_id" value="{{ client_id }}">
            <input type="hidden" name="response_type" value="{{ response_type }}">
            <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}">
            <input type="hidden" name="scope" value="{{ scope }}">
            <input type="hidden" name="state" value="{{ state }}">
            <input type="hidden" name="nonce" value="{{ nonce }}">
            <input type="hidden" name="response_mode" value="{{ response_mode }}">
            <input type="hidden" name="code_challenge" value="{{ code_challenge }}">
            <input type="hidden" name="code_challenge_method" value="{{ code_challenge_method }}">

            <div class="form-group">
                <label for="username">Email or username</label>
                <input type="text" id="username" name="username"
                       value="{{ login_hint }}" autofocus
                       placeholder="user@example.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="Password">
            </div>

            <button type="submit" class="submit-btn">Sign in</button>
        </form>

        <div class="mock-notice">
            Entra ID Mock Server - Development/Testing Only
        </div>
    </div>
</body>
</html>
